interface:
  display_name: "Skill Security Review"
  short_description: "Audit local Codex or agent skill packages"
  default_prompt: "Use $skill-security-review when the user asks to review a local skill directory or zip. For installing new skills, prefer scripts/install-reviewed-skill so the package is staged in _pending, reviewed, and enabled only when no high or critical findings exist. Default to weak review. Use strong review only when requested; strong review must actually run Docker, and if Docker cannot be started or the audit image is missing, ask whether to install/start Docker and retry or switch to weak review. Summarize report.md and report.json with highest-risk findings first."
